<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Restaurante Isla del Sol - Lo mejor de la comida tradicional</title>
    <meta name="description" content="Descubre el delicioso menú del Restaurante Isla del Sol. Especialidades en pescados, carnes y comida tradicional con el sabor de la casa. Consulta nuestros precios y platos aquí.">
    <meta name="keywords" content="Restaurante Isla del Sol, menú digital, pescados, carnes, comida tradicional, restaurante colombiano">
    <link rel="icon" type="image/jpeg" href="public/images/favicon.jpeg">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Menú Restaurante Isla del Sol">
    <meta property="og:description" content="Explora nuestra deliciosa variedad de platos tradicionales. Pescados frescos y carnes seleccionadas en Isla del Sol.">
    <meta property="og:image" content="public/images/menu_main_bg.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Menú Restaurante Isla del Sol">
    <meta property="twitter:description" content="Nuestra carta completa ahora disponible online. Ven y disfruta del sabor tradicional.">
    
    <link rel="stylesheet" href="public/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body class="menu-page">
    <!-- H1 para SEO (Oculto visualmente pero accesible para lectores de pantalla y buscadores) -->
    <h1 class="sr-only">Menú del Restaurante Isla del Sol</h1>
    <!-- Pantalla de carga (Loader) -->
    <div id="loader" class="loader-container">
        <div class="loader-spinner"></div>
    </div>

    <!-- El fondo "menu_main_bg.png" contiene la tabla, el clip y las fotos de comida -->
    <div class="menu-outer-container">
        <main class="menu-content-area" id="menu-container">
            <!-- Los productos se cargarán dinámicamente mediante JS y JSON -->
        </main>
    </div>

    <!-- Modal de Detalles de Producto -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeProductModal()">&times;</span>
            <div id="modal-image-container"></div>
            <h2 id="modal-product-name"></h2>
            <p id="modal-product-description"></p>
            <div id="modal-product-price"></div>
        </div>
    </div>

    <script src="public/js/main.js"></script>
</body>

</html>
